<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlideAI - Visualização do Layout</title>
    <style>
        /* Paleta de Cores Deep Tech */
        :root {
            --bg-deep-oil: #060b16;       /* Fundo Petróleo Escuro */
            --bg-card: rgba(15, 23, 42, 0.65); /* Vidro Fosco Escuro */
            --electric-blue: #00d2ff;     /* Azul Neon */
            --tech-cyan: #00f5d4;         /* Ciano Tecnológico */
            --text-light: #f1f5f9;        /* Texto Claro */
            --text-muted: #94a3b8;        /* Texto Secundário */
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background-color: var(--bg-deep-oil);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 210, 255, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 245, 212, 0.05) 0px, transparent 50%);
        }

        header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid rgba(0, 210, 255, 0.15);
            background: rgba(6, 11, 22, 0.8);
            backdrop-filter: blur(12px);
        }

        .logo {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 3px;
            color: var(--electric-blue);
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        .logo span {
            color: var(--tech-cyan);
        }

        .container {
            width: 90%;
            max-width: 950px;
            margin: 40px auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Barra de Comando Estilo IA */
        .search-box {
            display: flex;
            background: var(--bg-card);
            padding: 8px 8px 8px 20px;
            border-radius: 14px;
            border: 1px solid rgba(0, 210, 255, 0.25);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: var(--electric-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1.05rem;
        }

        .search-box input::placeholder {
            color: #64748b;
        }

        .search-box button {
            background: linear-gradient(135deg, var(--electric-blue), var(--tech-cyan));
            border: none;
            padding: 14px 28px;
            color: #060b16;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .search-box button:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
        }

        /* Tela de Visualização do Slide */
        .slide-stage {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            min-height: 450px;
            padding: 50px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slide-stage::before {
            content: "";
            position: absolute;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 30px;
            border-top: 2px solid rgba(0, 245, 212, 0.3);
            border-right: 2px solid rgba(0, 245, 212, 0.3);
            pointer-events: none;
        }

        .slide-title {
            font-size: 2.6rem;
            font-weight: 700;
            color: white;
            margin: 0 0 30px 0;
            line-height: 1.2;
            border-left: 6px solid var(--electric-blue);
            padding-left: 20px;
        }

        .slide-body {
            font-size: 1.35rem;
            line-height: 1.8;
            color: var(--text-muted);
        }

        .slide-body ul {
            margin: 0;
            padding-left: 25px;
        }

        .slide-body li {
            margin-bottom: 16px;
            position: relative;
        }

        .slide-body li::marker {
            color: var(--tech-cyan);
        }

        /* Painel Inferior de Controle */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.4);
            padding: 15px 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 210, 255, 0.25);
            color: var(--electric-blue);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--electric-blue);
        }

        .slide-counter {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* Efeito de carregamento */
        .loader-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep-oil);
            border-radius: 20px;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 210, 255, 0.1);
            border-top-color: var(--tech-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            color: var(--tech-cyan);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Slide<span>AI</span> // Matrix</div>
    </header>

    <div class="container">
        <div class="search-box">
            <input type="text" id="promptInput" placeholder="Digite o tema da aula (ex: Inteligência Artificial na Educação, Clonagem Genética)...">
            <button id="btnGerar">Gerar Apresentação</button>
        </div>

        <div class="slide-stage" id="slideStage">
            <div class="loader-overlay" id="loader">
                <div class="spinner"></div>
                <div class="loader-text" id="loaderText">GeminAI processando e estruturando tópicos...</div>
            </div>

            <div class="slide-title" id="slideTitle">Interface Conectada ao Gemini</div>
            <div class="slide-body" id="slideBody">
                <p>Insira um tema acima e clique em "Gerar". O sistema irá fazer uma requisição em tempo real para a API do Gemini, recebendo dados estruturados e montando seus slides automaticamente.</p>
            </div>
        </div>

        <div class="toolbar">
            <div class="slide-counter" id="slideCounter">SLIDE: 0 / 0</div>
            <div class="nav-buttons">
                <button class="btn-action" id="btnVoltar">◀ Voltar</button>
                <button class="btn-action" id="btnAvancar">Avançar ▶</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenAI, Type } from "https://esm.run/@google/genai";

        // ⚠️ ADICIONE SUA CHAVE DE API DO GEMINI AQUI:
        const API_KEY = "SUA_CHAVE_API_AQUI"; 

        const ai = new GoogleGenAI({ apiKey: API_KEY });

        // Memória do estado da aplicação
        let slidesAtivos = [];
        let indexAtual = 0;

        // Esquema JSON para forçar o Gemini a responder exatamente na estrutura que precisamos
        const slideSchema = {
            type: Type.ARRAY,
            description: "Lista de slides gerados para a apresentação.",
            items: {
                type: Type.OBJECT,
                properties: {
                    titulo: { 
                        type: Type.STRING, 
                        description: "Título curto do slide. Ex: '01 // Introdução'" 
                    },
                    conteudo: {
                        type: Type.ARRAY,
                        description: "Lista contendo de 3 a 4 tópicos explicativos resumidos para o corpo do slide.",
                        items: { type: Type.STRING }
                    }
                },
                required: ["titulo", "conteudo"]
            }
        };

        // Função principal de chamada à API
        async function gerarApresentacaoReal() {
            const temaInput = document.getElementById('promptInput').value.trim();
            if (!temaInput) {
                alert("Por favor, digite um tema para gerar a apresentação!");
                return;
            }

            const loader = document.getElementById('loader');
            document.getElementById('loaderText').innerText = "GeminAI processando e estruturando tópicos...";
            loader.style.display = 'flex';

            try {
                // Chamada oficial da API configurada com Structured Outputs (JSON)
                const response = await ai.models.generateContent({
                    model: 'gemini-2.5-flash',
                    contents: `Crie uma apresentação de slides acadêmica e didática sobre o tema: "${temaInput}". A apresentação deve conter entre 4 e 5 slides sequenciais bem explicados.`,
                    config: {
                        // Instrução do sistema para garantir tom técnico e formatação limpa
                        systemInstruction: "Você é um assistente especialista em criar roteiros de slides acadêmicos e tecnológicos estruturados. Nunca use markdown na resposta, envie apenas o JSON puro solicitado.",
                        responseMimeType: "application/json",
                        responseSchema: slideSchema,
                    }
                });

                // Converte o texto JSON puro retornado pela API de volta para Objeto JavaScript
                slidesAtivos = JSON.parse(response.text);
                
                indexAtual = 0;
                renderizarSlide();
                
            } catch (error) {
                console.error("Erro na API do Gemini:", error);
                alert("Ocorreu um erro ao gerar os slides. Verifique se sua chave API está correta ou dê uma olhada no console (F12).");
            } finally {
                loader.style.display = 'none';
            }
        }

        // Renderiza os dados no HTML da sua Stage
        function renderizarSlide() {
            if (slidesAtivos.length === 0) return;

            const slide = slidesAtivos[indexAtual];
            const containerTitulo = document.getElementById('slideTitle');
            const containerCorpo = document.getElementById('slideBody');
            const containerContador = document.getElementById('slideCounter');

            containerTitulo.innerText = slide.titulo;

            let htmlContent = "<ul>";
            slide.conteudo.forEach(topico => {
                htmlContent += `<li>${topico}</li>`;
            });
            htmlContent += "</ul>";
            containerCorpo.innerHTML = htmlContent;

            containerContador.innerText = `SLIDE: ${indexAtual + 1} / ${slidesAtivos.length}`;
        }

        // Funções de Navegação adaptadas para o escopo do módulo
        function avancar() {
            if (indexAtual < slidesAtivos.length - 1) {
                indexAtual++;
                renderizarSlide();
            }
        }

        function retroceder() {
            if (indexAtual > 0) {
                indexAtual--;
                renderizarSlide();
            }
        }

        // Event Listeners para acionar os botões
        document.getElementById('btnGerar').addEventListener('click', gerarApresentacaoReal);
        document.getElementById('btnAvancar').addEventListener('click', avancar);
        document.getElementById('btnVoltar').addEventListener('click', retroceder);
    </script>
</body>
</html>
